<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root {
  --bg: #080d1a;
  --surface: #0f1829;
  --card: #131f35;
  --card2: #182540;
  --accent: #00e87a;
  --accent2: #00b85e;
  --text: #e8eeff;
  --muted: #6b7a99;
  --danger: #ff4757;
  --warn: #ffb800;
  --fwd: #ff6b4a;
  --mid: #4a9eff;
  --def: #00e87a;
  --flx: #ffb800;
  --border: rgba(255,255,255,0.07);
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
h1,h2,h3,.big { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
input, select { font-family: 'DM Sans', sans-serif; }

/* AUTH */
.auth-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at 50% 0%, #00e87a18 0%, transparent 70%); }
.auth-logo { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 0.08em; color: var(--accent); text-align: center; line-height: 1; margin-bottom: 4px; }
.auth-sub { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 40px; text-align: center; }
.auth-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 28px 24px; width: 100%; max-width: 380px; }
.auth-tabs { display: flex; margin-bottom: 24px; background: var(--bg); border-radius: 8px; padding: 4px; }
.auth-tab { flex: 1; padding: 8px; border: none; background: none; color: var(--muted); font-size: 0.9rem; font-weight: 600; border-radius: 6px; transition: all 0.2s; }
.auth-tab.active { background: var(--accent); color: #000; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; }
.form-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 1rem; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: var(--accent); }
.btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; transition: all 0.2s; }
.btn-accent { background: var(--accent); color: #000; }
.btn-accent:hover { background: var(--accent2); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.auth-err { color: var(--danger); font-size: 0.85rem; margin-top: 12px; text-align: center; }

/* APP SHELL */
.app { min-height: 100vh; padding-bottom: 70px; }
.content { padding: 16px; max-width: 500px; margin: 0 auto; }

/* BOTTOM NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px; border: none; background: none; color: var(--muted); font-size: 0.6rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; gap: 4px; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* HEADER */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-top: 8px; }
.page-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.04em; }
.header-action { background: none; border: none; color: var(--muted); padding: 6px; }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; margin-bottom: 12px; }
.card-sm { padding: 14px; }
.card-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; margin-bottom: 10px; }

/* HOME */
.hero-pts { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; line-height: 1; color: var(--accent); }
.hero-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
.stat-row { display: flex; gap: 10px; }
.stat-box { flex: 1; background: var(--surface); border-radius: 10px; padding: 12px; text-align: center; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--text); }
.stat-lbl { font-size: 0.65rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.my-players { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.player-chip { display: flex; align-items: center; gap: 6px; background: var(--surface); border-radius: 8px; padding: 6px 10px; font-size: 0.8rem; font-weight: 600; }
.player-chip .cap-badge { background: var(--warn); color: #000; border-radius: 4px; padding: 1px 5px; font-size: 0.65rem; font-weight: 700; }

/* LEADERBOARD */
.lb-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; width: 28px; color: var(--muted); }
.lb-rank.top1 { color: #ffd700; }
.lb-rank.top2 { color: #c0c0c0; }
.lb-rank.top3 { color: #cd7f32; }
.lb-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
.lb-you { font-size: 0.65rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }
.lb-pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); }

/* SQUAD BUILDER */
.budget-bar-wrap { margin-bottom: 16px; }
.budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.budget-text { font-size: 0.85rem; font-weight: 600; }
.budget-bar { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.budget-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.budget-fill.over { background: var(--danger); }
.pos-counts { display: flex; gap: 8px; margin-bottom: 16px; }
.pos-count { flex: 1; text-align: center; background: var(--surface); border-radius: 8px; padding: 8px 4px; }
.pos-count-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; }
.pos-count-lbl { font-size: 0.6rem; color: var(--muted); font-weight: 700; text-transform: uppercase; }
.pos-section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 0 6px; display: flex; align-items: center; gap: 8px; }
.pos-dot { width: 8px; height: 8px; border-radius: 50%; }
.player-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--card); border-radius: 10px; margin-bottom: 6px; border: 1px solid var(--border); transition: all 0.15s; }
.player-row.selected { border-color: var(--accent); background: #001a0f; }
.player-row.captain-row { border-color: var(--warn); background: #1a1200; }
.player-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
.player-price { font-size: 0.8rem; color: var(--muted); font-weight: 600; margin-right: 6px; }
.pos-badge { font-size: 0.6rem; font-weight: 700; border-radius: 4px; padding: 2px 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.squad-actions { display: flex; gap: 10px; margin-top: 16px; }
.squad-actions .btn { flex: 1; }
.captain-section { margin-top: 16px; }
.captain-hint { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
.cap-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border-radius: 10px; margin-bottom: 6px; }
.cap-row.active { background: #1a1200; border: 1px solid var(--warn); }
.cap-row-name { flex: 1; font-weight: 600; }
.cap-crown { font-size: 1.1rem; }
.squad-err { color: var(--danger); font-size: 0.85rem; text-align: center; margin: 10px 0; }
.count-badge { display: inline-block; background: var(--surface); border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; font-weight: 700; color: var(--muted); }

/* MATCHDAYS */
.md-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 10px; }
.md-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; }
.md-date { font-size: 0.75rem; color: var(--muted); font-weight: 500; margin-top: 2px; }
.md-pts { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); }
.md-pts-lbl { font-size: 0.65rem; color: var(--muted); font-weight: 700; text-transform: uppercase; }
.md-top-row { display: flex; justify-content: space-between; align-items: flex-start; }
.md-events { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
.md-event-pill { font-size: 0.75rem; font-weight: 600; background: var(--surface); border-radius: 20px; padding: 3px 10px; }
.player-pts-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.player-pts-row:last-child { border-bottom: none; }
.player-pts-val { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--accent); }
.player-pts-val.cap { color: var(--warn); }

/* ADMIN */
.admin-section { margin-bottom: 20px; }
.admin-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
.form-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; color: var(--text); font-size: 0.95rem; outline: none; margin-bottom: 8px; }
.form-input:focus { border-color: var(--accent); }
.form-select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; color: var(--text); font-size: 0.95rem; outline: none; margin-bottom: 8px; appearance: none; }
.checkbox-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface); border-radius: 8px; margin-bottom: 6px; }
.checkbox-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); }
.checkbox-row label { flex: 1; font-size: 0.9rem; font-weight: 500; }
.checkbox-row .price-tag { font-size: 0.75rem; color: var(--muted); }
.check-selected { background: #001a0f; border: 1px solid var(--accent); }
.event-entry { background: var(--surface); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.event-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
.event-row select { flex: 1; }
.event-row .btn-sm { padding: 8px 12px; font-size: 0.8rem; border-radius: 8px; border: none; white-space: nowrap; }
.btn-sm-danger { background: #ff475720; color: var(--danger); }
.btn-sm-accent { background: #00e87a20; color: var(--accent); }
.add-event-btn { width: 100%; background: var(--surface); border: 1px dashed var(--border); border-radius: 8px; padding: 10px; color: var(--muted); font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--surface); border-radius: 8px; margin-bottom: 8px; }
.toggle-lbl { font-size: 0.9rem; font-weight: 600; }
.toggle-sub { font-size: 0.75rem; color: var(--muted); }
.toggle { position: relative; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 24px; transition: 0.3s; }
.toggle-slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: var(--muted); border-radius: 50%; transition: 0.3s; }
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #000; }
.preview-box { background: var(--surface); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.preview-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--accent); margin-bottom: 10px; }

/* MISC */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-text { font-size: 0.9rem; font-weight: 600; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card2); border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.loading { display: flex; align-items: center; justify-content: center; height: 60px; color: var(--muted); font-size: 0.9rem; }
.gk-badge { background: #7c3aed; color: #fff; font-size: 0.6rem; font-weight: 700; padding: 1px 5px; border-radius: 4px; text-transform: uppercase; }
.section-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; }
.info-box { background: #00e87a10; border: 1px solid #00e87a30; border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 0.82rem; color: #00e87a99; }
</style>

<div id="root"><div class="loading" style="height:100vh">Loading...</div></div>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCEwTSLYM2hiipeKboGqMkjkJ6j2WqRqtk",
  authDomain: "ilwes2026fantasy-9ab71.firebaseapp.com",
  projectId: "ilwes2026fantasy-9ab71",
  storageBucket: "ilwes2026fantasy-9ab71.firebasestorage.app",
  messagingSenderId: "1032102472499",
  appId: "1:1032102472499:web:1a8bd76398b92aaa216c46"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ===== DATA =====
const PLAYERS = [
  {id:'niki',name:'Niki',pos:'FWD',price:17},
  {id:'viljami',name:'Viljami',pos:'FWD',price:14},
  {id:'lauri',name:'Lauri',pos:'FWD',price:12},
  {id:'danylo',name:'Danylo',pos:'FWD',price:13},
  {id:'kassu',name:'Kassu',pos:'MID',price:40},
  {id:'ilyas',name:'Ilyas',pos:'MID',price:11},
  {id:'hugo',name:'Hugo',pos:'MID',price:10},
  {id:'niilo',name:'Niilo',pos:'MID',price:9},
  {id:'nino',name:'Nino',pos:'MID',price:8},
  {id:'aaro',name:'Aaro',pos:'DEF',price:7},
  {id:'eino',name:'Eino',pos:'DEF',price:6},
  {id:'julle',name:'Julle',pos:'DEF',price:5},
  {id:'ohto',name:'Ohto',pos:'DEF',price:3},
  {id:'maksym',name:'Maksym',pos:'DEF',price:4},
  {id:'vaino',name:'Väinö',pos:'DEF',price:2},
  {id:'abdullah',name:'Abdullah',pos:'DEF',price:1},
  {id:'matias',name:'Matias',pos:'FLX',price:4},
  {id:'henri',name:'Henri',pos:'FLX',price:5},
];
const POS_COLOR = {FWD:'var(--fwd)',MID:'var(--mid)',DEF:'var(--def)',FLX:'var(--flx)'};
const POS_LABEL = {FWD:'FWD',MID:'MID',DEF:'DEF',FLX:'FLX'};
const PTS = {
  played:1,
  goalFWD:4,goalMID:5,goalDEF:7,goalGK:12,goalFLX:5,
  assistFWD:2,assistMID:3,assistDEF:5,assistGK:12,assistFLX:3,
  csHalfGK:3,csHalfDEF:2,csFullDEF:6,csFullGK:6,
  penaltySave:5,outstandingSave:3,
  motm:5,perfBonus:3,
  yellow:-1,red:-3,penMiss:-2,ownGoal:-2
};

// ===== STATE =====
let S = {
  user:null, userDoc:null, page:'home',
  allUsers:[], matchdays:[],
  squadDraft:[], captainDraft:null,
  authMode:'login', authErr:'',
  // admin form state
  adLabel:'', adDate:'', adPlayed:[], adGkId:'',
  adGoals:[], adAssists:[],
  adHTCS:false, adFTCS:false,
  adPenSaves:[], adOutSaves:[],
  adYellows:[], adReds:[], adPenMisses:[], adOwnGoals:[],
  adMotm:'', adPerfBonus:'',
  adPreview:null,
};

// ===== POINTS =====
function calcPlayerPts(pid, ev) {
  const pl = PLAYERS.find(p=>p.id===pid);
  if(!pl) return 0;
  let pts = 0;
  if((ev.played||[]).includes(pid)) pts += PTS.played;
  (ev.goals||[]).forEach(g => {
    if(g.pid!==pid) return;
    pts += g.gk ? PTS.goalGK : (PTS['goal'+pl.pos]||PTS.goalFLX);
  });
  (ev.assists||[]).forEach(a => {
    if(a.pid!==pid) return;
    pts += a.gk ? PTS.assistGK : (PTS['assist'+pl.pos]||PTS.assistFLX);
  });
  if(pl.pos==='DEF') {
    const isGK = ev.gkId===pid;
    if(ev.htCS) pts += isGK ? PTS.csHalfGK : PTS.csHalfDEF;
    if(ev.ftCS) pts += isGK ? PTS.csFullGK : PTS.csFullDEF;
    (ev.penSaves||[]).forEach(p => { if(p===pid) pts+=PTS.penaltySave; });
    (ev.outSaves||[]).forEach(p => { if(p===pid) pts+=PTS.outstandingSave; });
  }
  if(ev.motm===pid) pts+=PTS.motm;
  if(ev.perfBonus===pid) pts+=PTS.perfBonus;
  (ev.yellows||[]).forEach(p=>{if(p===pid)pts+=PTS.yellow;});
  (ev.reds||[]).forEach(p=>{if(p===pid)pts+=PTS.red;});
  (ev.penMisses||[]).forEach(p=>{if(p===pid)pts+=PTS.penMiss;});
  (ev.ownGoals||[]).forEach(p=>{if(p===pid)pts+=PTS.ownGoal;});
  return pts;
}

function calcAllPlayerPts(ev) {
  const r={};
  PLAYERS.forEach(p=>{ r[p.id]=calcPlayerPts(p.id,ev); });
  return r;
}

function calcManagerPts(squad, captain, playerPts) {
  return (squad||[]).reduce((sum,pid)=>{
    const p = playerPts[pid]||0;
    return sum + (pid===captain ? p*2 : p);
  },0);
}

function squadCost(sq) {
  return (sq||[]).reduce((s,pid)=>{ const p=PLAYERS.find(x=>x.id===pid); return s+(p?p.price:0); },0);
}

function validateSquad(sq) {
  if(sq.length!==8) return `Pick exactly 8 players (${sq.length}/8)`;
  if(squadCost(sq)>100) return `Over budget! (${squadCost(sq)}m / 100m)`;
  const c={FWD:0,MID:0,DEF:0,FLX:0};
  sq.forEach(pid=>{const p=PLAYERS.find(x=>x.id===pid);if(p)c[p.pos]++;});
  if(c.DEF<2) return 'Need at least 2 DEF/GK';
  if(c.DEF>3) return 'Max 3 DEF/GK';
  if(c.MID<2) return 'Need at least 2 MID';
  if(c.MID>3) return 'Max 3 MID';
  if(c.FWD<2) return 'Need at least 2 FWD';
  if(c.FWD>3) return 'Max 3 FWD';
  return null;
}

// ===== FIREBASE OPS =====
let _unsubUsers=null, _unsubMatchdays=null;
function startListeners() {
  if(_unsubUsers) _unsubUsers();
  if(_unsubMatchdays) _unsubMatchdays();
  _unsubUsers = db.collection('users').orderBy('totalPoints','desc').onSnapshot(snap=>{
    S.allUsers = snap.docs.map(d=>({id:d.id,...d.data()}));
    S.userDoc = S.allUsers.find(u=>u.id===S.user?.uid) || S.userDoc;
    render();
  });
  _unsubMatchdays = db.collection('matchdays').where('published','==',true).orderBy('createdAt','desc').onSnapshot(snap=>{
    S.matchdays = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}
function stopListeners() {
  if(_unsubUsers) { _unsubUsers(); _unsubUsers=null; }
  if(_unsubMatchdays) { _unsubMatchdays(); _unsubMatchdays=null; }
}

async function saveSquad() {
  S.saveErr = '';
  const err = validateSquad(S.squadDraft);
  if(err){ S.saveErr=err; render(); return; }
  if(!S.captainDraft){ S.saveErr='Pick a captain first!'; render(); return; }
  S.saveErr = 'Saving...'; render();
  try {
    await db.collection('users').doc(S.user.uid).set(
      {squad:S.squadDraft, captain:S.captainDraft, totalPoints: S.userDoc?.totalPoints||0, name: S.userDoc?.name||'', email: S.userDoc?.email||'', isAdmin: S.userDoc?.isAdmin||false},
      {merge:true}
    );
    S.saveErr = '';
    showToast('Squad saved! ✅');
    await loadData();
    navigate('home');
  } catch(e) {
    S.saveErr = 'Error: ' + e.message;
    render();
    console.error('Save error:', e);
  }
}

async function publishMatchday() {
  if(!S.adLabel){showToast('Enter matchday name');return;}
  if(S.adPlayed.length===0){showToast('Select players who played');return;}
  
  const events = {
    played:S.adPlayed, gkId:S.adGkId,
    goals:S.adGoals, assists:S.adAssists,
    htCS:S.adHTCS, ftCS:S.adFTCS,
    penSaves:S.adPenSaves, outSaves:S.adOutSaves,
    yellows:S.adYellows, reds:S.adReds,
    penMisses:S.adPenMisses, ownGoals:S.adOwnGoals,
    motm:S.adMotm, perfBonus:S.adPerfBonus
  };
  
  const playerPts = calcAllPlayerPts(events);
  
  await db.collection('matchdays').add({
    label:S.adLabel, date:S.adDate||'', published:true,
    events, playerPoints:playerPts,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  
  // Update all managers
  const uSnap = await db.collection('users').get();
  const batch = db.batch();
  uSnap.forEach(doc=>{
    const u=doc.data();
    const pts=calcManagerPts(u.squad,u.captain,playerPts);
    batch.update(doc.ref,{totalPoints:firebase.firestore.FieldValue.increment(pts)});
  });
  await batch.commit();
  
  // Reset admin form
  Object.assign(S,{adLabel:'',adDate:'',adPlayed:[],adGkId:'',adGoals:[],adAssists:[],adHTCS:false,adFTCS:false,adPenSaves:[],adOutSaves:[],adYellows:[],adReds:[],adPenMisses:[],adOwnGoals:[],adMotm:'',adPerfBonus:'',adPreview:null});
  
  showToast('Matchday published! ⚽');
  await loadData();
  navigate('matchdays');
}

function navigate(page) {
  S.page=page;
  if(page==='squad'){S.squadDraft=[...(S.userDoc?.squad||[])];S.captainDraft=S.userDoc?.captain||null;}

// ===== AUTH =====
async function handleAuth() {
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value;
  const name=document.getElementById('auth-name')?.value?.trim();
  if(!email||!pass){S.authErr='Fill in all fields';render();return;}
  
  try {
    if(S.authMode==='login') {
      await auth.signInWithEmailAndPassword(email,pass);
    } else {
      if(!name){S.authErr='Enter your name';render();return;}
      const teamName=document.getElementById('auth-team')?.value?.trim()||name+"'s FC";
      const cred=await auth.createUserWithEmailAndPassword(email,pass);
      const uid=cred.user.uid;
      const snap=await db.collection('users').get();
      const isAdmin=snap.empty;
      await db.collection('users').doc(uid).set({
        name,teamName,email,isAdmin,squad:[],captain:null,totalPoints:0
      });
    }
  } catch(e) {
    S.authErr=e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim();
    render();
  }
}

  const playedPlayers = PLAYERS.filter(p=>(S.adPlayed||[]).includes(p.id));
  const preview = S.adPlayed.length>0 ? calcAllPlayerPts({
    played:S.adPlayed,gkId:S.adGkId,goals:S.adGoals,assists:S.adAssists,
    htCS:S.adHTCS,ftCS:S.adFTCS,penSaves:S.adPenSaves,outSaves:S.adOutSaves,
    yellows:S.adYellows,reds:S.adReds,penMisses:S.adPenMisses,ownGoals:S.adOwnGoals,
    motm:S.adMotm,perfBonus:S.adPerfBonus
  }) : null;

  return `
  <div class="page-header"><div class="page-title">Admin Panel</div></div>
  <div class="info-box">Only you can see this. Enter match results and publish — everyone's points update automatically.</div>

  <!-- MATCHDAY INFO -->
  <div class="admin-section">
    <div class="admin-label">Matchday Info</div>
    <input class="form-input" id="ad-label" placeholder="e.g. Matchday 3 vs FC Muut" value="${S.adLabel}" oninput="S.adLabel=this.value">
    <input class="form-input" id="ad-date" type="date" value="${S.adDate}" oninput="S.adDate=this.value">
  </div>

  <!-- WHO PLAYED -->
  <div class="admin-section">
    <div class="admin-label">Who Played? (1pt each)</div>
    ${PLAYERS.map(p=>{
      const sel=(S.adPlayed||[]).includes(p.id);
      const isGK=S.adGkId===p.id;
      return `<div class="checkbox-row ${sel?'check-selected':''}">
        <input type="checkbox" id="pl-${p.id}" ${sel?'checked':''} onchange="togglePlayed('${p.id}')">
        <label for="pl-${p.id}">${p.name} <span class="pos-badge" style="background:${POS_COLOR[p.pos]}20;color:${POS_COLOR[p.pos]}">${p.pos}</span></label>
        ${sel&&p.pos==='DEF'?`<label style="font-size:0.75rem;color:#7c3aed;cursor:pointer" onclick="setGK('${p.id}')">${isGK?'<span class="gk-badge">GK ✓</span>':'<span style="color:var(--muted)">Set GK</span>'}</label>`:''}
      </div>`;
    }).join('')}
  </div>

  <!-- GOALS -->
  <div class="admin-section">
    <div class="admin-label">Goals ⚽</div>
    ${(S.adGoals||[]).map((g,i)=>`
    <div class="event-entry">
      <div class="event-row">
        <select class="form-select" style="margin:0" onchange="S.adGoals[${i}].pid=this.value">
          <option value="">Select scorer...</option>
          ${PLAYERS.map(p=>`<option value="${p.id}" ${g.pid===p.id?'selected':''}>${p.name} (${p.pos})</option>`).join('')}
        </select>
        <button class="btn-sm btn-sm-danger" onclick="S.adGoals.splice(${i},1);render()">✕</button>
      </div>
      ${g.pid&&PLAYERS.find(p=>p.id===g.pid)?.pos==='DEF'?`
      <label style="display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--muted)">
        <input type="checkbox" ${g.gk?'checked':''} onchange="S.adGoals[${i}].gk=this.checked"> GK Goal? (12pts instead of 7)
      </label>`:''}
    </div>`).join('')}
    <button class="add-event-btn" onclick="S.adGoals.push({pid:'',gk:false});render()">+ Add Goal</button>
  </div>

  <!-- ASSISTS -->
  <div class="admin-section">
    <div class="admin-label">Assists 🎯</div>
    ${(S.adAssists||[]).map((a,i)=>`
    <div class="event-entry">
      <div class="event-row">
        <select class="form-select" style="margin:0" onchange="S.adAssists[${i}].pid=this.value">
          <option value="">Select player...</option>
          ${PLAYERS.map(p=>`<option value="${p.id}" ${a.pid===p.id?'selected':''}>${p.name} (${p.pos})</option>`).join('')}
        </select>
        <button class="btn-sm btn-sm-danger" onclick="S.adAssists.splice(${i},1);render()">✕</button>
      </div>
      ${a.pid&&PLAYERS.find(p=>p.id===a.pid)?.pos==='DEF'?`
      <label style="display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--muted)">
        <input type="checkbox" ${a.gk?'checked':''} onchange="S.adAssists[${i}].gk=this.checked"> GK Assist? (12pts instead of 5)
      </label>`:''}
    </div>`).join('')}
    <button class="add-event-btn" onclick="S.adAssists.push({pid:'',gk:false});render()">+ Add Assist</button>
  </div>

  <!-- CLEAN SHEETS -->
  <div class="admin-section">
    <div class="admin-label">Clean Sheets 🧱</div>
    <div class="toggle-row">
      <div><div class="toggle-lbl">Half Time Clean Sheet</div><div class="toggle-sub">GK +3pts, DEF +2pts</div></div>
      <label class="toggle"><input type="checkbox" ${S.adHTCS?'checked':''} onchange="S.adHTCS=this.checked"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <div><div class="toggle-lbl">Full Time Clean Sheet</div><div class="toggle-sub">GK +6pts, DEF +6pts</div></div>
      <label class="toggle"><input type="checkbox" ${S.adFTCS?'checked':''} onchange="S.adFTCS=this.checked"><span class="toggle-slider"></span></label>
    </div>
  </div>

  <!-- GK SPECIALS -->
  <div class="admin-section">
    <div class="admin-label">GK Specials 🧤</div>
    <div class="section-sub">Penalty saves, outstanding saves</div>
    ${(S.adPenSaves||[]).map((pid,i)=>`
    <div class="event-row" style="margin-bottom:8px">
      <select class="form-select" style="margin:0;flex:1" onchange="S.adPenSaves[${i}]=this.value">
        <option value="">Penalty Save (5pts)...</option>
        ${playedPlayers.filter(p=>p.pos==='DEF').map(p=>`<option value="${p.id}" ${pid===p.id?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <button class="btn-sm btn-sm-danger" onclick="S.adPenSaves.splice(${i},1);render()">✕</button>
    </div>`).join('')}
    <button class="add-event-btn" onclick="S.adPenSaves.push('');render()">+ Penalty Save</button>
    ${(S.adOutSaves||[]).map((pid,i)=>`
    <div class="event-row" style="margin-bottom:8px">
      <select class="form-select" style="margin:0;flex:1" onchange="S.adOutSaves[${i}]=this.value">
        <option value="">Outstanding Save (3pts)...</option>
        ${playedPlayers.filter(p=>p.pos==='DEF').map(p=>`<option value="${p.id}" ${pid===p.id?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <button class="btn-sm btn-sm-danger" onclick="S.adOutSaves.splice(${i},1);render()">✕</button>
    </div>`).join('')}
    <button class="add-event-btn" onclick="S.adOutSaves.push('');render()">+ Outstanding Save</button>
  </div>

  <!-- NEGATIVES -->
  <div class="admin-section">
    <div class="admin-label">Cards & Misses 🟨🟥</div>
    ${renderMultiEvent('Yellow Card (-1pt)','adYellows')}
    ${renderMultiEvent('Red Card (-3pts)','adReds')}
    ${renderMultiEvent('Penalty Miss (-2pts)','adPenMisses')}
    ${renderMultiEvent('Own Goal (-2pts)','adOwnGoals')}
  </div>

  <!-- AWARDS -->
  <div class="admin-section">
    <div class="admin-label">Awards 🏅</div>
    <select class="form-select" onchange="S.adMotm=this.value">
      <option value="">Man of the Match (5pts)...</option>
      ${playedPlayers.map(p=>`<option value="${p.id}" ${S.adMotm===p.id?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <select class="form-select" onchange="S.adPerfBonus=this.value">
      <option value="">Performance Bonus (3pts)...</option>
      ${playedPlayers.map(p=>`<option value="${p.id}" ${S.adPerfBonus===p.id?'selected':''}>${p.name}</option>`).join('')}
    </select>
  </div>

  <!-- PREVIEW -->
  ${preview&&playedPlayers.length>0?`
  <div class="preview-box">
    <div class="preview-title">Points Preview</div>
    ${playedPlayers.map(p=>{
      const pts=preview[p.id]||0;
      return `<div class="player-pts-row">
        <div>${p.name} <span class="pos-badge" style="background:${POS_COLOR[p.pos]}20;color:${POS_COLOR[p.pos]}">${p.pos}</span></div>
        <div class="player-pts-val" style="color:${pts<0?'var(--danger)':pts===0?'var(--muted)':'var(--accent)'}">${pts>0?'+':''}${pts}</div>
      </div>`;
    }).join('')}
  </div>`:''}

  <button class="btn btn-accent" style="margin-bottom:20px" onclick="publishMatchday()">🚀 Publish Matchday</button>`;
}

function renderMultiEvent(label, key) {
  const list=S[key]||[];
  return `
  ${list.map((pid,i)=>`
  <div class="event-row" style="margin-bottom:6px">
    <select class="form-select" style="margin:0;flex:1" onchange="S.${key}[${i}]=this.value">
      <option value="">${label}...</option>
      ${PLAYERS.map(p=>`<option value="${p.id}" ${pid===p.id?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <button class="btn-sm btn-sm-danger" onclick="S.${key}.splice(${i},1);render()">✕</button>
  </div>`).join('')}
  <button class="add-event-btn" onclick="S.${key}.push('');render()">+ ${label}</button>`;
}

// ===== INTERACTIONS =====
function togglePlayer(pid) {
  const idx=S.squadDraft.indexOf(pid);
  if(idx>=0) {
    S.squadDraft.splice(idx,1);
    if(S.captainDraft===pid) S.captainDraft=null;
  } else {
    if(S.squadDraft.length>=8){showToast('Squad full! Remove a player first');return;}
    // Check budget
    const newCost=squadCost(S.squadDraft)+(PLAYERS.find(p=>p.id===pid)?.price||0);
    if(newCost>100){showToast('Over budget!');return;}
    S.squadDraft.push(pid);
  }
  render();
}

function setCaptain(pid) {
  S.captainDraft=S.captainDraft===pid?null:pid;
  render();
}

function togglePlayed(pid) {
  const idx=(S.adPlayed||[]).indexOf(pid);
  if(idx>=0) {
    S.adPlayed.splice(idx,1);
    if(S.adGkId===pid) S.adGkId='';
  } else {
    S.adPlayed.push(pid);
  }
  render();
}

function setGK(pid) {
  S.adGkId=S.adGkId===pid?'':pid;
  render();
}

function showToast(msg) {
  let t=document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== EVENT ATTACHMENT =====
function attachAuth() {
  document.getElementById('auth-submit')?.addEventListener('click',handleAuth);
  document.getElementById('auth-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
}

function attachListeners() {
  // Listeners are inline via onclick for simplicity
}

// ===== INIT =====
auth.onAuthStateChanged(async user=>{
  S.authErr='';
  S.user=user;
  if(user) {
    render();
    const docRef=db.collection('users').doc(user.uid);
    const snap=await docRef.get();
    if(!snap.exists) {
      const allSnap=await db.collection('users').get();
      const isAdmin=allSnap.empty;
      await docRef.set({name:user.email.split('@')[0],teamName:user.email.split('@')[0]+"'s FC",email:user.email,isAdmin,squad:[],captain:null,totalPoints:0});
    }
    startListeners();
  } else {
    stopListeners();
    S.allUsers=[];
    S.matchdays=[];
    render();
  }
});

// Expose to global for inline event handlers
window.navigate=navigate;
window.togglePlayer=togglePlayer;
window.setCaptain=setCaptain;
window.saveSquad=saveSquad;
window.togglePlayed=togglePlayed;
window.setGK=setGK;
window.publishMatchday=publishMatchday;
</script>
</body>
</html>
